services:
  # === DATABASE ===
  postgres:
    image: postgres@sha256:6bd113a3de3274beda0f056ebf0d75cf060dc4a493b72bea6f9d810dce63f897
    container_name: progetto_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === BACKEND ===
  backend:
    build: ./backend
    container_name: progetto_backend
    environment:
      NODE_ENV: ${NODE_ENV}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # === FRONTEND ===
  frontend:
    build: ./frontend
    container_name: progetto_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

  # === CADDY - profilo standalone (porta 80/443) ===
  caddy:
    image: caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    container_name: progetto_caddy
    profiles:
      - standalone
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./nginx/technician:/srv/technician
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal
      - external

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  external:
    name: progetto_external
