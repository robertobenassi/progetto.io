<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Tecnico - Progetto.io</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle" style="font-size: 4rem; color: #667eea;"></i>
            <h3 class="mt-3">Login Tecnico</h3>
            <p class="text-muted">Accedi al tuo calendario attività</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div id="errorMsg" class="alert alert-danger d-none"></div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Accedi
            </button>
        </form>
    </div>

    <script>
        const API_URL = '/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Login response:', data);

                if (response.ok) {
                    if (data.user.role === 'viewer' && data.user.technician_id) {
                        localStorage.setItem('tech_token', data.token);
                        localStorage.setItem('tech_user', JSON.stringify(data.user));
                        window.location.href = 'calendar.html';
                    } else {
                        errorMsg.textContent = 'Accesso negato. Account non associato a un tecnico.';
                        errorMsg.classList.remove('d-none');
                    }
                } else {
                    errorMsg.textContent = data.message || 'Email o password non validi';
                    errorMsg.classList.remove('d-none');
                }
            } catch (error) {
                errorMsg.textContent = 'Errore di connessione';
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/technician/sw.js')
                .then(() => console.log('Service Worker registrato'))
                .catch(err => console.log('Service Worker errore:', err));
        }
    </script>
</body>
</html>
